<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RPG風マップシステム デモ</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <h1>RPG風テキストアドベンチャー ― マップ探索デモ</h1>

  <div id="game-frame">
    <div id="game-container"></div>
  </div>

  <div id="hud">
    <span>WASD / 矢印キー: 移動</span>
    <span>Space / Enter: 話しかける・進める</span>
    <span>Lキー: 実績一覧</span>
    <span>F1: デバッグ表示切替</span>
    <button id="debug-toggle">デバッグ表示 ON/OFF</button>
    <button id="fullscreen-toggle">全画面</button>
  </div>

  <div id="dialogue-box" class="hidden">
    <div class="dialogue-name"></div>
    <div class="dialogue-text"></div>
    <div class="dialogue-choices"></div>
    <div class="dialogue-hint"></div>
  </div>

  <div id="hud-top-right">
    <div id="mission-tracker" class="hidden"></div>
    <div id="achievement-toasts"></div>
  </div>

  <div id="omikuji-overlay" class="minigame-overlay hidden">
    <div class="omikuji-panel">
      <div class="omikuji-box"></div>
      <div class="omikuji-prompt">Space / Enter：おみくじを振る</div>
      <div class="omikuji-result hidden">
        <div class="omikuji-result-title"></div>
        <div class="omikuji-result-comment"></div>
      </div>
    </div>
  </div>

  <div id="treasure-lock-overlay" class="minigame-overlay hidden">
    <div class="treasure-lock-panel">
      <div class="treasure-lock-title">刻印の順番を当てよう</div>
      <div class="treasure-lock-buttons"></div>
      <div class="treasure-lock-feedback"></div>
    </div>
  </div>

  <div id="achievement-panel" class="hidden">
    <div class="achievement-panel-header">
      実績一覧
      <span class="achievement-panel-hint">Lキーで閉じる</span>
    </div>
    <div class="achievement-list"></div>
  </div>

  <p id="help">
    町 → 住宅街 → 商店街 → 広場 を中心に、広場から図書館・神社・学校へ、
    さらに神社から公園、学校から森へつながっています。<br />
    NPCの近くで頭上に目印が出たら、Space/Enterキーで話しかけられます。
  </p>

  <script type="module" src="js/main.js"></script>
</body>
</html>
